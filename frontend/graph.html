<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Graph - ComplyChip</title>
    <link rel="stylesheet" href="/css/design-system.css?v=4">
    <link rel="stylesheet" href="/css/components.css?v=4">
    <link rel="stylesheet" href="/css/dark-mode.css?v=4">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        .graph-container { position: relative; height: calc(100vh - var(--topbar-height) - 48px); background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
        .graph-svg { width: 100%; height: 100%; }

        /* Controls */
        .graph-controls {
            position: absolute; top: 16px; right: 16px; display: flex; flex-direction: column; gap: 4px;
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-md);
            box-shadow: var(--shadow-md); overflow: hidden; z-index: 5;
        }
        .control-btn {
            width: 36px; height: 36px; border: none; background: transparent; color: var(--text-secondary);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all var(--transition-fast); border-bottom: 1px solid var(--border);
        }
        .control-btn:last-child { border-bottom: none; }
        .control-btn:hover { background: var(--bg-input); color: var(--text-primary); }
        .control-btn svg { width: 16px; height: 16px; }

        /* Filter Panel */
        .graph-filters {
            position: absolute; top: 16px; left: 16px; background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius-md); box-shadow: var(--shadow-md); padding: 12px 16px; z-index: 5;
        }
        .graph-filters h4 { font-size: var(--text-xs); font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 8px; }
        .filter-item {
            display: flex; align-items: center; gap: 8px; padding: 4px 0; cursor: pointer;
            font-size: var(--text-sm); color: var(--text-secondary);
        }
        .filter-item input { accent-color: var(--accent); cursor: pointer; }
        .filter-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

        /* Legend */
        .graph-legend {
            position: absolute; bottom: 16px; left: 16px; background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius-md); box-shadow: var(--shadow-md); padding: 12px 16px; z-index: 5;
        }
        .graph-legend h4 { font-size: var(--text-xs); font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 8px; }
        .legend-row { display: flex; align-items: center; gap: 8px; padding: 3px 0; }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .legend-line { width: 20px; height: 2px; flex-shrink: 0; border-radius: 1px; }
        .legend-label { font-size: 11px; color: var(--text-secondary); }

        /* Info Panel */
        .info-panel {
            position: absolute; bottom: 16px; right: 16px; width: 300px; background: var(--bg-card);
            border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg);
            z-index: 5; display: none; overflow: hidden;
        }
        .info-panel.active { display: block; }
        .info-header {
            padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex;
            align-items: center; justify-content: space-between;
        }
        .info-header h4 { font-size: var(--text-sm); font-weight: 600; }
        .info-close {
            width: 24px; height: 24px; border: none; background: transparent; color: var(--text-muted);
            cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 4px;
        }
        .info-close:hover { background: var(--bg-input); }
        .info-body { padding: 12px 16px; }
        .info-field { margin-bottom: 8px; }
        .info-field-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
        .info-field-value { font-size: var(--text-sm); color: var(--text-primary); font-weight: 500; }
        .info-connections { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
        .info-connection { display: flex; align-items: center; gap: 6px; padding: 4px 0; font-size: 11px; color: var(--text-secondary); }
        .info-connection-type { font-size: 10px; padding: 1px 6px; background: var(--bg-input); border-radius: 4px; color: var(--text-muted); }

        /* D3 Styles */
        .node-label { font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 500; pointer-events: none; }
        .edge-label { font-family: 'Inter', sans-serif; font-size: 9px; fill: var(--text-muted); pointer-events: none; }
        .link { stroke-opacity: 0.4; }
        .link:hover { stroke-opacity: 0.8; }

        /* Tooltip */
        .graph-tooltip {
            position: absolute; background: var(--bg-sidebar); color: #fff; padding: 8px 12px;
            border-radius: var(--radius-md); font-size: 11px; pointer-events: none; z-index: 10;
            display: none; max-width: 200px; box-shadow: var(--shadow-lg);
        }
        .graph-tooltip.active { display: block; }
        .graph-tooltip-title { font-weight: 600; margin-bottom: 2px; }
        .graph-tooltip-meta { color: #94a3b8; font-size: 10px; }
    </style>
    <script>if(localStorage.getItem("complychip_theme")==="dark")document.documentElement.setAttribute("data-theme","dark")</script>
</head>
<body>
    <div class="app-layout">
        <div id="sidebar-container"></div>
        <div class="main-content">
            <div id="topbar-container"></div>
            <div class="page-content" style="max-width:none;padding:16px 24px;">
                <div class="graph-container" id="graphContainer">
                    <svg class="graph-svg" id="graphSvg"></svg>

                    <!-- Controls -->
                    <div class="graph-controls">
                        <button class="control-btn" onclick="zoomIn()" title="Zoom In">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
                        </button>
                        <button class="control-btn" onclick="zoomOut()" title="Zoom Out">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
                        </button>
                        <button class="control-btn" onclick="resetZoom()" title="Reset View">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
                        </button>
                    </div>

                    <!-- Filters -->
                    <div class="graph-filters">
                        <h4>Filter Nodes</h4>
                        <label class="filter-item"><input type="checkbox" checked onchange="toggleNodeType('document')"><span class="filter-dot" style="background:#4f46e5"></span> Documents</label>
                        <label class="filter-item"><input type="checkbox" checked onchange="toggleNodeType('entity')"><span class="filter-dot" style="background:#059669"></span> Entities</label>
                        <label class="filter-item"><input type="checkbox" checked onchange="toggleNodeType('vendor')"><span class="filter-dot" style="background:#d97706"></span> Vendors</label>
                        <label class="filter-item"><input type="checkbox" checked onchange="toggleNodeType('regulation')"><span class="filter-dot" style="background:#dc2626"></span> Regulations</label>
                    </div>

                    <!-- Legend -->
                    <div class="graph-legend">
                        <h4>Legend</h4>
                        <div class="legend-row"><span class="legend-dot" style="background:#4f46e5"></span><span class="legend-label">Document</span></div>
                        <div class="legend-row"><span class="legend-dot" style="background:#059669"></span><span class="legend-label">Entity</span></div>
                        <div class="legend-row"><span class="legend-dot" style="background:#d97706"></span><span class="legend-label">Vendor</span></div>
                        <div class="legend-row"><span class="legend-dot" style="background:#dc2626"></span><span class="legend-label">Regulation</span></div>
                        <div style="margin-top:6px;padding-top:6px;border-top:1px solid var(--border)">
                            <div class="legend-row"><span class="legend-line" style="background:#94a3b8"></span><span class="legend-label">References</span></div>
                            <div class="legend-row"><span class="legend-line" style="background:#4f46e5;border-style:dashed"></span><span class="legend-label">Supersedes</span></div>
                        </div>
                    </div>

                    <!-- Info Panel -->
                    <div class="info-panel" id="infoPanel">
                        <div class="info-header">
                            <h4 id="infoTitle">Node Details</h4>
                            <button class="info-close" onclick="closeInfoPanel()">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                            </button>
                        </div>
                        <div class="info-body" id="infoBody"></div>
                    </div>

                    <!-- Tooltip -->
                    <div class="graph-tooltip" id="graphTooltip">
                        <div class="graph-tooltip-title" id="tooltipTitle"></div>
                        <div class="graph-tooltip-meta" id="tooltipMeta"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/api.js?v=4"></script>
    <script src="/js/components.js?v=4"></script>
    <script>
        const nodeColors = { document: '#4f46e5', entity: '#059669', vendor: '#d97706', regulation: '#dc2626' };
        const nodeRadius = { document: 12, entity: 16, vendor: 12, regulation: 14 };

        const demoNodes = [
            { id: 'n1', label: 'GL Insurance', type: 'document', details: 'General Liability Insurance Policy', entity: 'Downtown Office Tower', score: 92 },
            { id: 'n2', label: 'OSHA Cert', type: 'document', details: 'OSHA Safety Certificate', entity: 'Harbor Industrial', score: 74 },
            { id: 'n3', label: 'EPA Permit', type: 'document', details: 'EPA Environmental Permit', entity: 'Harbor Industrial', score: 88 },
            { id: 'n4', label: 'Fire Safety', type: 'document', details: 'Fire Safety Inspection Report', entity: 'Downtown Office Tower', score: 90 },
            { id: 'n5', label: 'Building Permit', type: 'document', details: 'Building Permit #2024-1847', entity: 'Riverside Medical', score: 45 },
            { id: 'n6', label: 'Downtown Tower', type: 'entity', details: 'Downtown Office Tower', score: 82 },
            { id: 'n7', label: 'Harbor Industrial', type: 'entity', details: 'Harbor Industrial Complex', score: 61 },
            { id: 'n8', label: 'Riverside Medical', type: 'entity', details: 'Riverside Medical Center', score: 72 },
            { id: 'n9', label: 'Acme Insurance', type: 'vendor', details: 'Acme Insurance Corp', riskScore: 25 },
            { id: 'n10', label: 'BuildRight', type: 'vendor', details: 'BuildRight Construction', riskScore: 42 },
            { id: 'n11', label: 'OSHA Regulation', type: 'regulation', details: 'Occupational Safety & Health Act', jurisdiction: 'Federal' },
            { id: 'n12', label: 'EPA Standards', type: 'regulation', details: 'Environmental Protection Standards', jurisdiction: 'Federal' },
        ];

        const demoEdges = [
            { source: 'n1', target: 'n6', label: 'belongs to', type: 'references' },
            { source: 'n1', target: 'n9', label: 'issued by', type: 'references' },
            { source: 'n2', target: 'n7', label: 'belongs to', type: 'references' },
            { source: 'n2', target: 'n11', label: 'regulated by', type: 'references' },
            { source: 'n3', target: 'n7', label: 'belongs to', type: 'references' },
            { source: 'n3', target: 'n12', label: 'regulated by', type: 'references' },
            { source: 'n4', target: 'n6', label: 'belongs to', type: 'references' },
            { source: 'n4', target: 'n1', label: 'references', type: 'references' },
            { source: 'n5', target: 'n8', label: 'belongs to', type: 'references' },
            { source: 'n5', target: 'n10', label: 'contractor', type: 'references' },
            { source: 'n5', target: 'n4', label: 'supersedes', type: 'supersedes' },
            { source: 'n11', target: 'n7', label: 'applies to', type: 'references' },
            { source: 'n12', target: 'n7', label: 'applies to', type: 'references' },
            { source: 'n9', target: 'n6', label: 'services', type: 'references' },
            { source: 'n10', target: 'n8', label: 'services', type: 'references' },
        ];

        let simulation, svg, g, linkGroup, nodeGroup, labelGroup, zoom;
        let visibleTypes = new Set(['document', 'entity', 'vendor', 'regulation']);
        let nodes = [], edges = [];

        (async () => {
            if (!initLayout('graph', 'Knowledge Graph', 'Explore document relationships and connections')) return;
            await loadGraphData();
            initGraph();
        })();

        async function loadGraphData() {
            try {
                const res = await apiGet('/api/graph/visualize');
                if (res && res.ok) {
                    const data = await res.json();
                    if (data.nodes && data.nodes.length > 0) {
                        demoNodes.length = 0;
                        data.nodes.forEach(n => demoNodes.push({
                            id: n.id, label: n.label || n.id.substring(0, 12),
                            type: n.type || 'document', details: n.label || '',
                        }));
                        demoEdges.length = 0;
                        data.edges.forEach(e => demoEdges.push({
                            source: e.source, target: e.target,
                            label: e.label || e.relationship || '',
                            type: e.relationship || 'references',
                        }));
                    }
                }
            } catch { /* fall through to demo data */ }
        }

        function initGraph() {
            nodes = demoNodes.map(d => ({ ...d }));
            edges = demoEdges.map(d => ({ ...d }));

            const container = document.getElementById('graphContainer');
            const width = container.clientWidth;
            const height = container.clientHeight;

            svg = d3.select('#graphSvg');

            // Defs for arrow markers
            svg.append('defs').selectAll('marker')
                .data(['arrow'])
                .enter().append('marker')
                .attr('id', d => d)
                .attr('viewBox', '0 -5 10 10')
                .attr('refX', 25)
                .attr('refY', 0)
                .attr('markerWidth', 6)
                .attr('markerHeight', 6)
                .attr('orient', 'auto')
                .append('path')
                .attr('d', 'M0,-5L10,0L0,5')
                .attr('fill', '#94a3b8');

            g = svg.append('g');

            zoom = d3.zoom()
                .scaleExtent([0.3, 3])
                .on('zoom', (event) => g.attr('transform', event.transform));
            svg.call(zoom);

            linkGroup = g.append('g').attr('class', 'links');
            nodeGroup = g.append('g').attr('class', 'nodes');
            labelGroup = g.append('g').attr('class', 'labels');

            simulation = d3.forceSimulation(nodes)
                .force('link', d3.forceLink(edges).id(d => d.id).distance(120))
                .force('charge', d3.forceManyBody().strength(-300))
                .force('center', d3.forceCenter(width / 2, height / 2))
                .force('collision', d3.forceCollide().radius(30))
                .on('tick', ticked);

            renderGraph();
        }

        function renderGraph() {
            const filteredNodes = nodes.filter(n => visibleTypes.has(n.type));
            const filteredNodeIds = new Set(filteredNodes.map(n => n.id));
            const filteredEdges = edges.filter(e => {
                const srcId = typeof e.source === 'object' ? e.source.id : e.source;
                const tgtId = typeof e.target === 'object' ? e.target.id : e.target;
                return filteredNodeIds.has(srcId) && filteredNodeIds.has(tgtId);
            });

            // Links
            const links = linkGroup.selectAll('line').data(filteredEdges, d => `${d.source.id || d.source}-${d.target.id || d.target}`);
            links.exit().remove();
            const linksEnter = links.enter().append('line')
                .attr('class', 'link')
                .attr('stroke', '#94a3b8')
                .attr('stroke-width', 1.5)
                .attr('stroke-dasharray', d => d.type === 'supersedes' ? '5,3' : 'none')
                .attr('marker-end', 'url(#arrow)');

            // Edge Labels
            const edgeLabels = labelGroup.selectAll('.edge-label').data(filteredEdges, d => `${d.source.id || d.source}-${d.target.id || d.target}`);
            edgeLabels.exit().remove();
            edgeLabels.enter().append('text')
                .attr('class', 'edge-label')
                .attr('text-anchor', 'middle')
                .attr('dy', -5)
                .text(d => d.label);

            // Nodes
            const nodesSel = nodeGroup.selectAll('.node').data(filteredNodes, d => d.id);
            nodesSel.exit().remove();
            const nodesEnter = nodesSel.enter().append('g').attr('class', 'node')
                .call(d3.drag().on('start', dragStarted).on('drag', dragged).on('end', dragEnded));

            nodesEnter.append('circle')
                .attr('r', d => nodeRadius[d.type] || 12)
                .attr('fill', d => nodeColors[d.type])
                .attr('stroke', '#fff')
                .attr('stroke-width', 2)
                .style('cursor', 'pointer');

            nodesEnter.append('text')
                .attr('class', 'node-label')
                .attr('dy', d => (nodeRadius[d.type] || 12) + 14)
                .attr('text-anchor', 'middle')
                .attr('fill', 'var(--text-secondary)')
                .text(d => d.label);

            // Interactions
            nodesEnter.on('click', (event, d) => showInfoPanel(d))
                .on('mouseover', (event, d) => showTooltip(event, d))
                .on('mouseout', hideTooltip);

            simulation.nodes(filteredNodes);
            simulation.force('link').links(filteredEdges);
            simulation.alpha(0.5).restart();
        }

        function ticked() {
            linkGroup.selectAll('line')
                .attr('x1', d => d.source.x)
                .attr('y1', d => d.source.y)
                .attr('x2', d => d.target.x)
                .attr('y2', d => d.target.y);

            labelGroup.selectAll('.edge-label')
                .attr('x', d => (d.source.x + d.target.x) / 2)
                .attr('y', d => (d.source.y + d.target.y) / 2);

            nodeGroup.selectAll('.node')
                .attr('transform', d => `translate(${d.x},${d.y})`);
        }

        function dragStarted(event, d) { if (!event.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; }
        function dragged(event, d) { d.fx = event.x; d.fy = event.y; }
        function dragEnded(event, d) { if (!event.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }

        function zoomIn() { svg.transition().duration(300).call(zoom.scaleBy, 1.3); }
        function zoomOut() { svg.transition().duration(300).call(zoom.scaleBy, 0.7); }
        function resetZoom() {
            const container = document.getElementById('graphContainer');
            svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity.translate(container.clientWidth / 2, container.clientHeight / 2).scale(0.8).translate(-container.clientWidth / 2, -container.clientHeight / 2));
        }

        function toggleNodeType(type) {
            if (visibleTypes.has(type)) visibleTypes.delete(type);
            else visibleTypes.add(type);
            renderGraph();
        }

        function showTooltip(event, d) {
            const tooltip = document.getElementById('graphTooltip');
            document.getElementById('tooltipTitle').textContent = d.label;
            document.getElementById('tooltipMeta').textContent = d.details || d.type;
            tooltip.classList.add('active');
            tooltip.style.left = (event.pageX - document.querySelector('.graph-container').getBoundingClientRect().left + 15) + 'px';
            tooltip.style.top = (event.pageY - document.querySelector('.graph-container').getBoundingClientRect().top - 10) + 'px';
        }

        function hideTooltip() { document.getElementById('graphTooltip').classList.remove('active'); }

        function showInfoPanel(d) {
            document.getElementById('infoTitle').textContent = d.label;
            const connections = edges.filter(e => {
                const srcId = typeof e.source === 'object' ? e.source.id : e.source;
                const tgtId = typeof e.target === 'object' ? e.target.id : e.target;
                return srcId === d.id || tgtId === d.id;
            });

            let fieldsHtml = `<div class="info-field"><div class="info-field-label">Type</div><div class="info-field-value" style="text-transform:capitalize">${d.type}</div></div>`;
            fieldsHtml += `<div class="info-field"><div class="info-field-label">Full Name</div><div class="info-field-value">${d.details || d.label}</div></div>`;
            if (d.score !== undefined) fieldsHtml += `<div class="info-field"><div class="info-field-label">Score</div><div class="info-field-value" style="color:${getScoreColor(d.score)}">${d.score}/100</div></div>`;
            if (d.riskScore !== undefined) fieldsHtml += `<div class="info-field"><div class="info-field-label">Risk Score</div><div class="info-field-value">${d.riskScore}</div></div>`;
            if (d.entity) fieldsHtml += `<div class="info-field"><div class="info-field-label">Entity</div><div class="info-field-value">${d.entity}</div></div>`;
            if (d.jurisdiction) fieldsHtml += `<div class="info-field"><div class="info-field-label">Jurisdiction</div><div class="info-field-value">${d.jurisdiction}</div></div>`;

            if (connections.length > 0) {
                fieldsHtml += `<div class="info-connections"><div class="info-field-label" style="margin-bottom:6px">Connections (${connections.length})</div>`;
                connections.forEach(c => {
                    const srcId = typeof c.source === 'object' ? c.source.id : c.source;
                    const tgtId = typeof c.target === 'object' ? c.target.id : c.target;
                    const otherId = srcId === d.id ? tgtId : srcId;
                    const other = nodes.find(n => n.id === otherId);
                    if (other) {
                        fieldsHtml += `<div class="info-connection"><span class="filter-dot" style="background:${nodeColors[other.type]};width:8px;height:8px"></span>${other.label}<span class="info-connection-type">${c.label}</span></div>`;
                    }
                });
                fieldsHtml += '</div>';
            }

            document.getElementById('infoBody').innerHTML = fieldsHtml;
            document.getElementById('infoPanel').classList.add('active');
        }

        function closeInfoPanel() { document.getElementById('infoPanel').classList.remove('active'); }
    </script>
</body>
</html>
