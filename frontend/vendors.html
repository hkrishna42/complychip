<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendors - ComplyChip</title>
    <link rel="stylesheet" href="/css/design-system.css?v=4">
    <link rel="stylesheet" href="/css/components.css?v=4">
    <link rel="stylesheet" href="/css/dark-mode.css?v=4">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 24px; }
        .stat-card {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg);
            padding: 20px 24px; box-shadow: var(--shadow-xs);
        }

        .vendor-toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .vendor-toolbar .search-bar { max-width: 280px; }
        .add-vendor-btn { margin-left: auto; }

        .vendor-table-wrap { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
        .vendor-table { width: 100%; border-collapse: collapse; font-size: var(--text-sm); }
        .vendor-table th {
            text-align: left; padding: 10px 16px; background: var(--bg-input); font-size: 11px;
            font-weight: 600; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.04em;
            border-bottom: 1px solid var(--border); white-space: nowrap;
        }
        .vendor-table td { padding: 12px 16px; border-bottom: 1px solid var(--border-light); vertical-align: middle; }
        .vendor-table tr:last-child td { border-bottom: none; }
        .vendor-table tbody tr { cursor: pointer; transition: background var(--transition-fast); }
        .vendor-table tbody tr:hover td { background: var(--accent-light); }

        .risk-score { font-weight: 700; font-size: var(--text-sm); }
        .risk-score.low { color: var(--success); }
        .risk-score.medium { color: var(--warning); }
        .risk-score.high { color: var(--danger); }
        .risk-score.critical { color: #991b1b; }

        .vendor-actions { display: flex; gap: 4px; }
        .action-btn {
            width: 28px; height: 28px; border-radius: var(--radius-sm); border: none; background: transparent;
            color: var(--text-muted); cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
        }
        .action-btn:hover { background: var(--bg-input); color: var(--text-primary); }
        .action-btn svg { width: 14px; height: 14px; }

        /* Detail Panel */
        .detail-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 100; display: none; }
        .detail-overlay.active { display: block; }
        .detail-panel {
            position: fixed; top: 0; right: -500px; bottom: 0; width: 500px; background: var(--bg-card);
            border-left: 1px solid var(--border); box-shadow: var(--shadow-xl); z-index: 101;
            transition: right 0.3s ease; overflow-y: auto; display: flex; flex-direction: column;
        }
        .detail-panel.active { right: 0; }
        .detail-header {
            padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex;
            align-items: center; justify-content: space-between; flex-shrink: 0;
        }
        .detail-header h2 { font-size: var(--text-md); font-weight: 600; }
        .detail-close {
            width: 32px; height: 32px; border-radius: var(--radius-sm); border: none;
            background: transparent; color: var(--text-muted); cursor: pointer; display: flex;
            align-items: center; justify-content: center;
        }
        .detail-close:hover { background: var(--bg-input); color: var(--text-primary); }
        .detail-body { padding: 24px; flex: 1; }
        .detail-section { margin-bottom: 24px; }
        .detail-section-title { font-size: var(--text-xs); font-weight: 600; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.04em; margin-bottom: 12px; }
        .detail-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .detail-field-label { font-size: var(--text-xs); color: var(--text-muted); margin-bottom: 2px; }
        .detail-field-value { font-size: var(--text-sm); color: var(--text-primary); font-weight: 500; }
        .risk-factor { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .risk-factor-label { font-size: var(--text-xs); color: var(--text-secondary); width: 120px; flex-shrink: 0; }
        .risk-factor-bar { flex: 1; height: 8px; background: var(--bg-input); border-radius: 4px; overflow: hidden; }
        .risk-factor-fill { height: 100%; border-radius: 4px; }
        .risk-factor-value { font-size: var(--text-xs); font-weight: 600; width: 30px; text-align: right; }
        .chart-wrap { position: relative; height: 200px; margin-top: 12px; }

        /* Add Vendor Modal */
        .modal-overlay { display: none; }
        .modal-overlay.active { display: flex; }

        @media (max-width: 1024px) { .stats-row { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 768px) { .stats-row { grid-template-columns: 1fr; } .detail-panel { width: 100%; right: -100%; } }
    </style>
    <script>if(localStorage.getItem("complychip_theme")==="dark")document.documentElement.setAttribute("data-theme","dark")</script>
</head>
<body>
    <div class="app-layout">
        <div id="sidebar-container"></div>
        <div class="main-content">
            <div id="topbar-container"></div>
            <div class="page-content" style="max-width:1400px;">
                <!-- Summary Stats -->
                <div class="stats-row">
                    <div class="stat-card">
                        <div class="stat-label">Total Vendors</div>
                        <div class="stat-value" id="totalVendors">6</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">High Risk</div>
                        <div class="stat-value" id="highRisk" style="color:var(--danger)">1</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Avg Risk Score</div>
                        <div class="stat-value" id="avgRisk">26</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Expiring Contracts</div>
                        <div class="stat-value" id="expiringContracts" style="color:var(--warning)">2</div>
                    </div>
                </div>

                <!-- Toolbar -->
                <div class="vendor-toolbar">
                    <div class="search-bar">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        <input type="text" placeholder="Search vendors..." id="searchInput" oninput="filterVendors()">
                    </div>
                    <button class="btn btn-primary add-vendor-btn" onclick="openAddVendor()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        Add Vendor
                    </button>
                </div>

                <!-- Vendor Table -->
                <div class="vendor-table-wrap">
                    <div class="table-container">
                        <table class="vendor-table">
                            <thead>
                                <tr>
                                    <th>Vendor Name</th>
                                    <th>Type</th>
                                    <th>Risk Score</th>
                                    <th>Risk Level</th>
                                    <th>Documents</th>
                                    <th>Expired</th>
                                    <th>Contract Value</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="vendorTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Detail Panel -->
    <div class="detail-overlay" id="detailOverlay" onclick="closeDetail()"></div>
    <div class="detail-panel" id="detailPanel">
        <div class="detail-header">
            <h2 id="detailTitle">Vendor Details</h2>
            <button class="detail-close" onclick="closeDetail()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="detail-body" id="detailBody"></div>
    </div>

    <!-- Add Vendor Modal -->
    <div class="modal-overlay" id="addVendorModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Add New Vendor</h3>
                <button class="modal-close" onclick="closeAddVendor()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">Vendor Name <span class="required">*</span></label>
                    <input type="text" class="form-input" id="vendorName" placeholder="Enter vendor name">
                </div>
                <div class="form-group">
                    <label class="form-label">Vendor Type <span class="required">*</span></label>
                    <select class="form-select" id="vendorType">
                        <option value="">Select type...</option>
                        <option value="insurance">Insurance</option>
                        <option value="maintenance">Maintenance</option>
                        <option value="waste">Waste</option>
                        <option value="security">Security</option>
                        <option value="technology">Technology</option>
                        <option value="legal">Legal</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Notes</label>
                    <textarea class="form-textarea" id="vendorNotes" placeholder="Additional notes..." rows="3"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeAddVendor()">Cancel</button>
                <button class="btn btn-primary" onclick="saveVendor()">Add Vendor</button>
            </div>
        </div>
    </div>

    <script src="/js/api.js?v=4"></script>
    <script src="/js/components.js?v=4"></script>
    <script src="/js/charts.js?v=4"></script>
    <script>
        const demoVendors = [
            {
                id: 'v1', name: 'Acme Insurance Corp', category: 'insurance', tier: 'critical', status: 'active',
                risk_score: 25, risk_level: 'low', document_count: 4, contact_email: 'jsmith@acme.com',
                contact_phone: '555-0101', address: '100 Main St, New York, NY',
                riskFactors: { financial: 20, compliance: 15, operational: 30, reputational: 10, contractual: 25 },
                trend: [30, 28, 25, 27, 24, 25], notes: 'Long-term insurance partner. Strong financial standing.',
                vendorDocs: [
                    { name: 'Master Service Agreement', status: 'compliant', expiry: '2026-12-31' },
                    { name: 'Certificate of Insurance', status: 'compliant', expiry: '2026-09-15' },
                ]
            },
            {
                id: 'v2', name: 'BuildRight Construction', category: 'maintenance', tier: 'standard', status: 'active',
                risk_score: 42, risk_level: 'medium', document_count: 3, contact_email: 'mgarcia@buildright.com',
                contact_phone: '555-0102', address: '200 Oak Ave, Chicago, IL',
                riskFactors: { financial: 35, compliance: 50, operational: 45, reputational: 30, contractual: 40 },
                trend: [35, 38, 40, 39, 41, 42], notes: 'Active construction partner. One expired permit needs attention.',
                vendorDocs: [
                    { name: 'Construction Contract', status: 'compliant', expiry: '2027-03-15' },
                    { name: 'Building Permit', status: 'expired', expiry: '2026-02-28' },
                ]
            },
            {
                id: 'v3', name: 'SecureGuard Services', category: 'insurance', tier: 'standard', status: 'active',
                risk_score: 18, risk_level: 'low', document_count: 2, contact_email: 'dlee@secureguard.com',
                contact_phone: '555-0103', address: '300 Pine St, Austin, TX',
                riskFactors: { financial: 15, compliance: 10, operational: 20, reputational: 5, contractual: 18 },
                trend: [22, 20, 19, 18, 17, 18], notes: 'Reliable security services provider. All certifications current.',
                vendorDocs: [
                    { name: 'Security Services Agreement', status: 'compliant', expiry: '2026-11-30' },
                ]
            },
            {
                id: 'v4', name: 'GreenClean Environmental', category: 'waste', tier: 'standard', status: 'active',
                risk_score: 35, risk_level: 'medium', document_count: 3, contact_email: 'sjohnson@greenclean.com',
                contact_phone: '555-0104', address: '400 Elm Rd, Denver, CO',
                riskFactors: { financial: 25, compliance: 40, operational: 35, reputational: 20, contractual: 30 },
                trend: [28, 30, 32, 33, 34, 35], notes: 'Environmental services. EPA compliance documentation needs monitoring.',
                vendorDocs: [
                    { name: 'Environmental Services Contract', status: 'compliant', expiry: '2026-08-15' },
                    { name: 'EPA Compliance Certificate', status: 'warning', expiry: '2026-04-30' },
                ]
            },
            {
                id: 'v5', name: 'TechShield IT Solutions', category: 'maintenance', tier: 'critical', status: 'active',
                risk_score: 22, risk_level: 'low', document_count: 5, contact_email: 'achen@techshield.io',
                contact_phone: '555-0105', address: '500 Tech Blvd, San Jose, CA',
                riskFactors: { financial: 15, compliance: 20, operational: 25, reputational: 10, contractual: 22 },
                trend: [25, 24, 23, 22, 21, 22], notes: 'IT security and cloud services provider. SOC2 certified.',
                vendorDocs: [
                    { name: 'Cloud Services MSA', status: 'compliant', expiry: '2027-01-15' },
                    { name: 'Data Processing Agreement', status: 'compliant', expiry: '2027-03-15' },
                    { name: 'SOC2 Report', status: 'compliant', expiry: '2026-12-31' },
                ]
            },
            {
                id: 'v6', name: 'LegalEase Associates', category: 'insurance', tier: 'standard', status: 'active',
                risk_score: 15, risk_level: 'low', document_count: 2, contact_email: 'rpark@legalease.com',
                contact_phone: '555-0106', address: '600 Court St, Boston, MA',
                riskFactors: { financial: 10, compliance: 8, operational: 12, reputational: 5, contractual: 15 },
                trend: [18, 17, 16, 15, 14, 15], notes: 'Legal counsel for compliance matters. Excellent track record.',
                vendorDocs: [
                    { name: 'Legal Services Retainer', status: 'compliant', expiry: '2026-06-30' },
                ]
            },
        ];

        let allVendors = [];
        let filteredVendors = [];
        let riskHistoryChart = null;

        document.addEventListener('DOMContentLoaded', async () => {
            if (!initLayout('vendors', 'Vendor Risk Management', 'Monitor and manage vendor compliance risk')) return;
            await loadVendors();
        });

        async function loadVendors() {
            try {
                const res = await apiGet('/api/vendors');
                if (res && res.ok) {
                    const data = await res.json();
                    allVendors = data.vendors || [];
                } else {
                    throw new Error('fallback');
                }
            } catch { allVendors = demoVendors; }
            filteredVendors = [...allVendors];
            renderTable();
            updateStats();
        }

        function filterVendors() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            filteredVendors = allVendors.filter(v => v.name.toLowerCase().includes(search) || (v.category || v.type || '').toLowerCase().includes(search));
            renderTable();
        }

        function updateStats() {
            document.getElementById('totalVendors').textContent = allVendors.length;
            document.getElementById('highRisk').textContent = allVendors.filter(v => {
                const level = (v.risk_level || v.risk || '').toLowerCase();
                return level === 'high' || level === 'critical';
            }).length;
            const scores = allVendors.map(v => v.risk_score != null ? v.risk_score : (v.riskScore || 0));
            const avg = allVendors.length ? Math.round(scores.reduce((s, x) => s + x, 0) / allVendors.length) : 0;
            document.getElementById('avgRisk').textContent = avg;
            document.getElementById('expiringContracts').textContent = 0;
        }

        function getRiskClass(score) {
            if (score >= 50) return 'critical';
            if (score >= 35) return 'high';
            if (score >= 20) return 'medium';
            return 'low';
        }

        function getRiskLabel(risk) {
            return { low: 'Low', medium: 'Medium', high: 'High', critical: 'Critical' }[risk] || risk;
        }

        function renderTable() {
            const tbody = document.getElementById('vendorTableBody');
            tbody.innerHTML = filteredVendors.map(v => {
                const riskScore = v.risk_score != null ? v.risk_score : (v.riskScore || 0);
                const riskLevel = (v.risk_level || v.risk || 'low').toLowerCase();
                const category = v.category || v.type || '—';
                const docCount = v.document_count != null ? v.document_count : (v.docs || 0);
                const expired = v.expired || 0;
                return `
                <tr onclick="openDetail('${v.id}')">
                    <td><span class="font-medium">${v.name}</span></td>
                    <td class="text-secondary">${category}</td>
                    <td><span class="risk-score ${getRiskClass(riskScore)}">${riskScore}</span></td>
                    <td><span class="pill ${getRiskPill(riskLevel)}">${getRiskLabel(riskLevel)}</span></td>
                    <td>${docCount}</td>
                    <td>${expired > 0 ? `<span class="text-danger font-semibold">${expired}</span>` : '0'}</td>
                    <td class="font-medium">&mdash;</td>
                    <td>
                        <div class="vendor-actions">
                            <button class="action-btn" onclick="event.stopPropagation(); openDetail('${v.id}')" title="View">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                        </div>
                    </td>
                </tr>`;
            }).join('');
        }

        function openDetail(vendorId) {
            const v = allVendors.find(x => x.id === vendorId);
            if (!v) return;

            const riskScore = v.risk_score != null ? v.risk_score : (v.riskScore || 0);
            const riskLevel = (v.risk_level || v.risk || 'low').toLowerCase();
            const category = v.category || v.type || '—';
            const contactEmail = v.contact_email || v.email || 'N/A';
            const contactPhone = v.contact_phone || 'N/A';
            const address = v.address || 'N/A';
            const docCount = v.document_count != null ? v.document_count : (v.docs || 0);
            const onboardedDate = v.onboarded_date ? formatDate(v.onboarded_date) : 'N/A';

            document.getElementById('detailTitle').textContent = v.name;
            const factors = v.riskFactors || {};

            document.getElementById('detailBody').innerHTML = `
                <div class="detail-section">
                    <div class="detail-section-title">Vendor Information</div>
                    <div class="detail-info-grid">
                        <div><div class="detail-field-label">Type</div><div class="detail-field-value">${category}</div></div>
                        <div><div class="detail-field-label">Tier</div><div class="detail-field-value" style="text-transform:capitalize">${v.tier || 'N/A'}</div></div>
                        <div><div class="detail-field-label">Email</div><div class="detail-field-value">${contactEmail}</div></div>
                        <div><div class="detail-field-label">Phone</div><div class="detail-field-value">${contactPhone}</div></div>
                        <div><div class="detail-field-label">Address</div><div class="detail-field-value">${address}</div></div>
                        <div><div class="detail-field-label">Onboarded</div><div class="detail-field-value">${onboardedDate}</div></div>
                        <div><div class="detail-field-label">Documents</div><div class="detail-field-value">${docCount}</div></div>
                        <div><div class="detail-field-label">Status</div><div class="detail-field-value"><span class="pill ${getStatusPill(v.status || 'active')}">${v.status || 'active'}</span></div></div>
                    </div>
                </div>
                <div class="detail-section" style="text-align:center">
                    ${renderScoreRing(100 - riskScore, 120, 10)}
                    <div class="text-xs text-muted mt-2">Risk Score: ${riskScore}/100</div>
                    <div class="text-xs mt-1"><span class="pill ${getRiskPill(riskLevel)}">${getRiskLabel(riskLevel)}</span></div>
                </div>
                ${Object.keys(factors).length > 0 ? `
                <div class="detail-section">
                    <div class="detail-section-title">Risk Factors</div>
                    ${Object.entries(factors).map(([key, val]) => `
                        <div class="risk-factor">
                            <span class="risk-factor-label" style="text-transform:capitalize">${key.replace('_', ' ')}</span>
                            <div class="risk-factor-bar"><div class="risk-factor-fill" style="width:${val}%;background:${getScoreColor(100-val)}"></div></div>
                            <span class="risk-factor-value">${val}</span>
                        </div>
                    `).join('')}
                </div>` : ''}
                <div class="detail-section">
                    <div class="detail-section-title">Risk History</div>
                    <div class="chart-wrap"><canvas id="riskHistoryChart"></canvas></div>
                </div>
                ${(v.vendorDocs && v.vendorDocs.length > 0) ? `
                <div class="detail-section">
                    <div class="detail-section-title">Documents</div>
                    ${v.vendorDocs.map(d => `
                        <div style="display:flex;align-items:center;gap:10px;padding:10px;border:1px solid var(--border);border-radius:var(--radius-md);margin-bottom:8px;">
                            <svg viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2" width="18" height="18"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                            <div style="flex:1"><div class="text-sm font-medium">${d.name}</div><div class="text-xs text-muted">${formatDate(d.expiry)}</div></div>
                            <span class="pill ${getStatusPill(d.status)}">${d.status}</span>
                        </div>
                    `).join('')}
                </div>` : ''}
                ${v.notes ? `<div class="detail-section"><div class="detail-section-title">Notes</div><div style="padding:12px;background:var(--bg-input);border-radius:var(--radius-md);font-size:var(--text-sm);color:var(--text-secondary);line-height:1.5">${v.notes}</div></div>` : ''}
            `;

            // Risk History Chart
            setTimeout(() => {
                if (riskHistoryChart) riskHistoryChart.destroy();
                const trend = v.trend || [riskScore, riskScore, riskScore, riskScore, riskScore, riskScore];
                riskHistoryChart = createLineChart('riskHistoryChart', ['Oct', 'Nov', 'Dec', 'Jan', 'Feb', 'Mar'], [
                    { label: 'Risk Score', data: trend, color: chartColors.danger, fill: true, bgColor: chartColors.dangerLight },
                ], { yScale: { min: 0, max: Math.max(60, riskScore + 10) } });
            }, 100);

            document.getElementById('detailOverlay').classList.add('active');
            document.getElementById('detailPanel').classList.add('active');
        }

        function closeDetail() {
            document.getElementById('detailOverlay').classList.remove('active');
            document.getElementById('detailPanel').classList.remove('active');
            if (riskHistoryChart) { riskHistoryChart.destroy(); riskHistoryChart = null; }
        }

        function openAddVendor() { document.getElementById('addVendorModal').classList.add('active'); }
        function closeAddVendor() { document.getElementById('addVendorModal').classList.remove('active'); }

        async function saveVendor() {
            const name = document.getElementById('vendorName').value.trim();
            const category = document.getElementById('vendorType').value;
            if (!name || !category) { showToast('Please fill in vendor name and type', 'error'); return; }

            const newVendor = {
                name,
                category,
                risk_score: 0,
                risk_level: 'low',
                document_count: 0,
                tier: 'standard',
                status: 'active',
                contact_email: '',
                contact_phone: '',
                address: '',
                notes: document.getElementById('vendorNotes').value,
            };

            try {
                const res = await apiPost('/api/vendors', newVendor);
                if (res && res.ok) {
                    const created = await res.json();
                    allVendors.push(created);
                } else {
                    // fallback: add locally with temp id
                    newVendor.id = 'v' + Date.now();
                    allVendors.push(newVendor);
                }
            } catch {
                newVendor.id = 'v' + Date.now();
                allVendors.push(newVendor);
            }

            filteredVendors = [...allVendors];
            renderTable();
            updateStats();
            closeAddVendor();
            showToast(`Vendor "${name}" added successfully`, 'success');
            document.getElementById('vendorName').value = '';
            document.getElementById('vendorType').value = '';
            document.getElementById('vendorNotes').value = '';
        }
    </script>
</body>
</html>
